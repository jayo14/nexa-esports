<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Cancellation - NeXa</title>
</head>
<body style="margin:0;padding:0;background:#0c0c0e;font-family:Arial,sans-serif;color:#fff;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#111113;border:1px solid #27272a;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:24px;text-align:center;background:#000;">
              <img src="https://nexaesports.com/nexa-logo.jpg" alt="NeXa Logo" width="120" />
            </td>
          </tr>
          <tr>
            <td style="padding:32px;text-align:center;">
              <h1 style="margin:0 0 10px;font-size:30px;line-height:1.2;">Event Cancelled</h1>
              <p style="margin:0 0 6px;color:#ef4444;font-weight:bold;">{{{MISSION_NAME}}}</p>
              <p style="margin:0 0 20px;color:#a1a1aa;line-height:1.6;">
                This event scheduled for {{{EVENT_DATE}}} has been cancelled.
              </p>
              <a href="{{{DISCORD_URL}}}" style="display:inline-block;border:1px solid #3f3f46;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:bold;">
                Join Discord for Updates
              </a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
