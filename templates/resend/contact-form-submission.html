<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeXa Contact Form</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:Arial,sans-serif;color:#111;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#fff;border:1px solid #e4e4e7;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="padding:20px;text-align:center;background:linear-gradient(135deg,#FF1F44,#CC1936);color:#fff;">
              <h1 style="margin:0;font-size:22px;">NeXa Contact Form</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <h2 style="margin:0 0 12px;font-size:20px;">New Contact Form Submission</h2>
              <p style="margin:0 0 8px;"><strong>Name:</strong> {{{CONTACT_NAME}}}</p>
              <p style="margin:0 0 8px;"><strong>Email:</strong> {{{CONTACT_EMAIL}}}</p>
              <div style="margin-top:14px;padding:12px;background:#f1f3f4;border-radius:8px;">
                {{{CONTACT_MESSAGE_HTML}}}
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
