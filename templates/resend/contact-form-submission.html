<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no" />
  <title>NeXa Contact Form</title>
  <style>
    body, table, td, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table { border-collapse:separate; mso-table-lspace:0pt; mso-table-rspace:0pt; }
    img { border:0; outline:none; text-decoration:none; -ms-interpolation-mode:bicubic; }
    a[x-apple-data-detectors] { color:inherit !important; text-decoration:none !important; font-size:inherit !important; font-family:inherit !important; font-weight:inherit !important; line-height:inherit !important; }
    @media only screen and (max-width: 640px) {
      .wrapper { padding: 14px !important; }
      .card-cell { padding: 0 !important; }
      .card { border-radius: 20px !important; }
      .logo { width: 108px !important; }
      .content { padding: 22px 18px !important; }
      .title { font-size: 28px !important; }
      .copy { font-size: 14px !important; line-height: 1.65 !important; }
      .label-col, .value-col { display: block !important; width: 100% !important; }
      .value-col { padding-top: 6px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background:#070708;font-family:Inter,Segoe UI,Arial,sans-serif;color:#ffffff;">
  <div style="display:none;overflow:hidden;line-height:1px;opacity:0;max-height:0;max-width:0;">New NeXa contact form message received from {{{CONTACT_NAME}}}.</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" class="wrapper" style="padding:24px;">
    <tr>
      <td align="center" class="card-cell">
        <table role="presentation" width="640" cellpadding="0" cellspacing="0" class="card" style="max-width:640px;width:100%;background:#101014;border:1px solid #242429;border-radius:26px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.45);">
          <tr>
            <td style="padding:26px 24px;text-align:center;background:linear-gradient(180deg,#15151b 0%,#0f0f14 100%);border-bottom:1px solid #21212a;">
              <img src="https://nexaesports.com/nexa-logo.jpg" alt="NeXa Logo" width="122" class="logo" style="display:block;margin:0 auto;border-radius:14px;" />
            </td>
          </tr>
          <tr>
            <td class="content" style="padding:30px 32px 10px;">
              <p style="margin:0 0 10px;color:#fb7185;font-weight:700;letter-spacing:1.2px;font-size:12px;text-transform:uppercase;">Inbox Alert</p>
              <h1 class="title" style="margin:0;font-size:36px;line-height:1.1;font-weight:800;letter-spacing:-0.4px;">New Contact Submission</h1>
              <p class="copy" style="margin:12px 0 0;color:#b3b3bf;font-size:15px;line-height:1.7;">
                A new message has been submitted through the NeXa website contact form.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:2px 24px 0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#17171f;border:1px solid #2a2a35;border-radius:16px;">
                <tr>
                  <td class="label-col" style="width:120px;padding:14px 14px 6px;color:#ff7b97;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;">Name</td>
                  <td class="value-col" style="padding:14px 14px 6px;color:#ededf3;font-size:14px;font-weight:600;">{{{CONTACT_NAME}}}</td>
                </tr>
                <tr>
                  <td class="label-col" style="width:120px;padding:4px 14px 14px;color:#ff7b97;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;">Email</td>
                  <td class="value-col" style="padding:4px 14px 14px;color:#ededf3;font-size:14px;font-weight:600;">{{{CONTACT_EMAIL}}}</td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px 30px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#13131a;border:1px solid #2a2a34;border-radius:16px;">
                <tr>
                  <td style="padding:12px 14px 8px;color:#ff7b97;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;">Message</td>
                </tr>
                <tr>
                  <td class="copy" style="padding:0 14px 16px;color:#dbdbe5;font-size:14px;line-height:1.72;">
                {{{CONTACT_MESSAGE_HTML}}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
