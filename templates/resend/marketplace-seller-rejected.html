<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>Seller Request Update - NeXa</title>
  <style>
    @media only screen and (max-width: 640px) {
      .wrapper { padding: 14px !important; }
      .card { border-radius: 20px !important; }
      .content { padding: 28px 20px !important; }
      .hero { font-size: 30px !important; }
      .cta { width: 100% !important; text-align: center !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background:#070708;font-family:Inter,Segoe UI,Arial,sans-serif;color:#ffffff;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" class="wrapper" style="padding:24px;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellpadding="0" cellspacing="0" class="card" style="max-width:640px;width:100%;background:#101014;border:1px solid #242429;border-radius:26px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.45);">
          <tr>
            <td style="padding:26px 24px;text-align:center;background:linear-gradient(180deg,#15151b 0%,#0f0f14 100%);border-bottom:1px solid #21212a;">
              <img src="https://nexaesports.com/nexa-logo.jpg" alt="NeXa Logo" width="122" style="display:block;margin:0 auto;border-radius:14px;" />
            </td>
          </tr>
          <tr>
            <td class="content" style="padding:36px 34px 14px;text-align:center;">
              <p style="margin:0 0 12px;color:#fb7185;font-weight:700;letter-spacing:1.2px;font-size:12px;text-transform:uppercase;">Seller Request Review</p>
              <h1 class="hero" style="margin:0;font-size:38px;line-height:1.1;font-weight:800;letter-spacing:-0.4px;">Application Update</h1>
              <p style="margin:14px auto 0;max-width:520px;color:#b3b3bf;font-size:15px;line-height:1.72;">
                Your seller request was not approved at this time. You can continue using all buyer marketplace features.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 24px 0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#17171f;border:1px solid #2a2a35;border-radius:16px;">
                <tr>
                  <td style="padding:16px 16px 8px;color:#ff7a95;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;">
                    Review Reason
                  </td>
                </tr>
                <tr>
                  <td style="padding:0 16px 16px;color:#ececf2;font-size:14px;line-height:1.6;">
                    {{{REASON}}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:22px 34px 8px;text-align:center;">
              <a href="https://nexaesports.com/marketplace" class="cta" style="display:inline-block;border:1px solid #3f3f4b;color:#ffffff;background:#17171f;padding:13px 28px;border-radius:14px;text-decoration:none;font-weight:800;font-size:14px;">
                Continue as Buyer
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:12px 34px 30px;text-align:center;color:#8f8f9a;font-size:12px;line-height:1.6;">
              You can re-apply later after profile and trust-signal updates.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
