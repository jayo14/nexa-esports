<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>NeXa Mission Update</title>
  <style>
    @media only screen and (max-width: 640px) {
      .wrapper { padding: 14px !important; }
      .card { border-radius: 20px !important; }
      .content { padding: 24px 18px !important; }
      .hero { font-size: 30px !important; }
      .meta-cell { display: block !important; width: 100% !important; }
      .meta-cell + .meta-cell { padding-top: 8px !important; }
      .cta { width: 100% !important; text-align: center !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background:#070708;font-family:Inter,Segoe UI,Arial,sans-serif;color:#ffffff;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" class="wrapper" style="padding:24px;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellpadding="0" cellspacing="0" class="card" style="max-width:640px;width:100%;background:#101014;border:1px solid #242429;border-radius:26px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.45);">
          <tr>
            <td style="padding:24px;text-align:center;background:linear-gradient(180deg,#15151b 0%,#0f0f14 100%);border-bottom:1px solid #21212a;">
              <img src="https://nexaesports.com/nexa-logo.jpg" alt="NeXa Logo" width="122" style="display:block;margin:0 auto;border-radius:14px;" />
            </td>
          </tr>
          <tr>
            <td style="padding:0;">
              <img src="{{{HERO_IMAGE_URL}}}" alt="Mission Hero" width="640" style="width:100%;max-width:640px;height:auto;display:block;" />
            </td>
          </tr>
          <tr>
            <td class="content" style="padding:30px 32px 14px;">
              <p style="margin:0 0 10px;color:#fb7185;font-weight:700;letter-spacing:1.2px;font-size:12px;text-transform:uppercase;">Briefing Active</p>
              <h1 class="hero" style="margin:0;font-size:38px;line-height:1.1;font-weight:800;letter-spacing:-0.4px;">{{{MISSION_NAME}}}</h1>
              <p style="margin:14px 0 0;color:#b8b8c2;font-size:15px;line-height:1.72;">{{{MISSION_BRIEFING}}}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:4px 24px 2px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td class="meta-cell" style="width:33.333%;padding:6px;">
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#17171f;border:1px solid #2b2b37;border-radius:16px;">
                      <tr><td style="padding:12px 12px 6px;color:#ff7b97;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;">Date</td></tr>
                      <tr><td style="padding:0 12px 12px;color:#ededf3;font-size:14px;font-weight:600;">{{{EVENT_DATE}}}</td></tr>
                    </table>
                  </td>
                  <td class="meta-cell" style="width:33.333%;padding:6px;">
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#17171f;border:1px solid #2b2b37;border-radius:16px;">
                      <tr><td style="padding:12px 12px 6px;color:#ff7b97;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;">Time</td></tr>
                      <tr><td style="padding:0 12px 12px;color:#ededf3;font-size:14px;font-weight:600;">{{{EVENT_TIME}}}</td></tr>
                    </table>
                  </td>
                  <td class="meta-cell" style="width:33.333%;padding:6px;">
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#17171f;border:1px solid #2b2b37;border-radius:16px;">
                      <tr><td style="padding:12px 12px 6px;color:#ff7b97;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;">Host</td></tr>
                      <tr><td style="padding:0 12px 12px;color:#ededf3;font-size:14px;font-weight:600;">{{{HOST_NAME}}}</td></tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:18px 32px 8px;text-align:left;">
              <a href="{{{EVENT_LINK}}}" class="cta" style="display:inline-block;background:#ec131e;color:#ffffff;padding:14px 26px;border-radius:14px;text-decoration:none;font-weight:800;font-size:14px;letter-spacing:0.35px;box-shadow:0 10px 28px rgba(236,19,30,0.38);">
                Accept Mission Objectives
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:10px 32px 30px;color:#8f8f9a;font-size:12px;line-height:1.6;">
              You are receiving this update as part of NeXa operational notifications.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
